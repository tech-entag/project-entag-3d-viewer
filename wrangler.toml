# Cloudflare Pages configuration.
# The Vercel deployment config (vercel.json) is left in place and untouched;
# this drives the parallel Cloudflare Pages deployment.

name = "project-entag-3d-viewer"
compatibility_date = "2024-09-23"

# Required: the api/ handlers rely on Node built-ins (Buffer, node:path) and
# the env -> process.env bridge in functions/api/[[path]].ts.
compatibility_flags = ["nodejs_compat"]

# Static SPA output produced by `pnpm build:cloudflare`.
pages_build_output_dir = "dist"

# Non-secret runtime config. Secrets (API keys, tokens) are NOT defined here —
# set those in the Cloudflare Pages project settings or via
# `wrangler pages secret put`. See docs/cloudflare-migration.md for the full list.
[vars]
DIGIFABSTER_UPLOAD_ENDPOINT = "https://digifabster.com/v2/upload_models/"
# NOTE: switch `version-test` -> `version-live` for the production Bubble app.
BUBBLE_DATA_API_BASE_URL = "https://app.entag.co/version-test/api/1.1/obj"
# Public base URL for R2 objects (enable r2.dev on the bucket, or attach a
# custom domain, and paste it here). Required only for objects fetched by
# external services or the browser (CAD STEP/DWG staging, viewer bubbles,
# sheet-nesting output, embed uploads). The DXF dedup cache does NOT need it.
R2_PUBLIC_BASE_URL = ""

# --- DigiFabster batch-price defaults (POST /v2/batch_price/material/) ---
# These are machine-scoped and stable; material is auto-picked per model via
# preselection. The batch-price route reads them as fallbacks when the request
# body does not override them.

# Delivery lead-time priority (machine-scoped). Must match the machine the
# priced material lives on, else batch_price returns an empty matrix with no
# error. This is the priority id that live batch_price calls return prices for.
DIGIFABSTER_DEFAULT_LEAD_TIME_IDS = "8fcabd8a-b22e-4b5e-9a7c-9e686cc00fcf"

# Tolerance selection. Active default = ISO 2768-Standard (sort_order 1).
# DigiFabster requires config.tolerance; pass `tolerance` in the body to override.
# Other options on this machine:
#   Fine   (ISO 28768, requires drawings): 8e86287c-c28f-4af0-85f1-bdb8998f3e98
#   Course (ISO 2768):                     4585cfd6-7463-4830-a18d-2761af3ed72f
DIGIFABSTER_DEFAULT_TOLERANCE_ID = "78bd2907-7b21-466e-b612-8bf71336a9b5"

# Cloudflare R2 bucket binding (replaces Vercel Blob). Create the bucket first:
#   wrangler r2 bucket create entag-3d-viewer
[[r2_buckets]]
binding = "BLOB_BUCKET"
bucket_name = "entag-3d-viewer"
