          type: number
          format: double
        printing_time_in_h_batch:
          type: number
          format: double
        mvbb_volume_cm:
          type: number
          format: double
        batch_capacity:
          type: integer
      required:
      - height_in_mm
      - model_weight
      - printing_time_in_h
      - printing_time_in_h_batch
      - support_weight
      - surface_area_of_bb_in_cm
      - surface_in_cm
      - volume_cm
      - volume_of_bb_in_cm
