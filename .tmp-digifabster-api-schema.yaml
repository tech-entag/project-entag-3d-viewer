openapi: 3.0.3
info:
  title: DigiFabster API
  version: 2.0.0
  description: |-
    DigiFabster is an API-centric platform created so that most of operations with data could be performed via API. Your app can be empowered to manage almost any type of data which created in DigiFabster widget or back office. There are various use cases which were successfully built by our clients and partners:
    –Synchronization between DigiFabster and ERP or CRM systems;
    – Internal apps using info about models, orders or clients created in DigiFabster platform;
    – Pricing and quotation software;
    – Custom widget for CAD files analyzing and quotation;
    – Many more.
