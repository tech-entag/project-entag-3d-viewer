  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
tags:
- name: auth
  description: |-
    To make most of requests to DigiFabster API you'd need an access token. There are 3 ways to get it: obtain an anonymous access token, obtain a regular access token on behalf of your company user and obtain a root-level access token to operate. All 3 types are explained in details below.
    Access tokens expire after 7 days.
    To sign a request with a token pass it in the `Authorization` Header.
- name: models
  description: tag models description
- name: orders
  description: tag orders description
- name: carts
  description: tag carts description
- name: materials
  description: tag materials description
