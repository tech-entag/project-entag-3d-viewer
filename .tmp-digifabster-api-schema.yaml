    TbdReasonEnum:
      enum:
      - line_item_total
      - order_total
      - machine_quantity
      - non_cad
      - lead_time_quantity
      - complexity_is_too_high
      - no_suitable_feature
      - purchase_attachment
      - bends_quantity
      - profiles_doesnt_match
      type: string
      description: |-
        * `line_item_total` - Your order will be held for a manual review as one or more of the items totals exceed the price limits.
        * `order_total` - Your order will be held for a manual review as your order total exceeds the price limits.
        * `machine_quantity` - Your order will be held for a manual review as one or more of the items exceed the quantity limits.
        * `non_cad` - Your order will be held for a manual review as it includes files that can’t be automatically processed.
        * `lead_time_quantity` - Your order will be held for a manual review as one or more of the items exceed the quantity limits.
        * `complexity_is_too_high` - Complexity of your part is too high. Order will be held for a manual review.
        * `no_suitable_feature` - Some of the features can’t be automatically quoted. The order will require a manual review.
        * `purchase_attachment` - Orders with technical documents attached will be held for manual review.
        * `bends_quantity` - Structure of bends may be be too complex. Order will be held for manual review.
        * `profiles_doesnt_match` - Selected profile doesn’t match the recognized geometry of your part, part will be held for manual review.
