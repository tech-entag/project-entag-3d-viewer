            * `group_by_object_model` - Group by models
            * `group_by_purchase` - Group by line-items
        filename_template:
          type: string
          title: Zip model filename template
          description: 'Custom template for filenames, for files downloaded through
            management order_detail page.<br>Next list of variables will be replaced
            with actual values:<br>%n - Buyer''s full name<br>%o - company order id<br>%m
            - model id<br>%i - purchase id<br>%c - index number of purchase in order
            (or among all orders in case of multiple)<br>%f - original filename<br>And
            also these variables available only in group by line-items mode:<br>%q
            - Quantity in line item<br>%M - Material name<br>Example: ''%n_%o_%m''
            without quotes will generate filename like ''AdamSmith_221_812-1nTG.stl''<br>(Short
            4-letter hash (may be added to avoid collisions) and extension at the
            end of the filename do not depend on this field)'
          maxLength: 255
        foldername_template:
          type: string
          title: Zip model folder name template
          description: Custom template for folder name that contains downloaded files.
            <br>Next list of variables will be replaced with actual values:<br>%o
